# fly.toml — generic OSRM routing service
# See CLAUDE.md for full deployment instructions
# ---------------------------------------------------------------------------

app            = "osrm-fly"       # replace with your app name after fly launch
primary_region = "ewr"            # change to your nearest Fly region

[build]
  dockerfile = "Dockerfile"

# ---------------------------------------------------------------------------
# Non-secret env vars — safe to commit
# OSM_REGION_URL must be set via: fly secrets set OSM_REGION_URL=<url>
# ---------------------------------------------------------------------------
[env]
  OSM_REGION_NAME = "region"         # short name used for local filenames
  OSRM_PROFILES   = "foot,car,bike"  # comma-separated: foot | car | bike
                                     # use fewer profiles to reduce RAM + build time
                                     # e.g. "foot" for a walkable event like Porchfest

# ---------------------------------------------------------------------------
# HTTP service — nginx on 8080 routes to per-profile OSRM instances
#   /route/v1/foot/*    or /route/v1/walking/*  → foot instance (:5000)
#   /route/v1/driving/*                         → car  instance (:5001)
#   /route/v1/cycling/* or /route/v1/bike/*     → bike instance (:5002)
# ---------------------------------------------------------------------------
[[services]]
  internal_port = 8080
  protocol      = "tcp"

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "requests"
    hard_limit = 300
    soft_limit = 200

  [[services.http_checks]]
    interval     = "30s"
    timeout      = "10s"
    grace_period = "180s"    # extra time: 3 profiles need longer to build + load
    method       = "GET"
    path         = "/health" # nginx returns 200 when ready

# ---------------------------------------------------------------------------
# Persistent volume — preprocessed OSM data survives restarts
# Create with: fly volumes create osrm_data --size 10 --region <region>
# Size 10GB to comfortably hold 3 profiles of a mid-sized region
# ---------------------------------------------------------------------------
[[mounts]]
  source      = "osrm_data"
  destination = "/data"

# ---------------------------------------------------------------------------
# VM sizing for 3 profiles
# Each profile adds ~500MB–1GB RAM depending on region size
# Philadelphia all 3 profiles: ~2–3GB total RAM needed
# Scale up with: fly scale vm shared-cpu-4x --memory 4096
# ---------------------------------------------------------------------------
[vm]
  cpu_kind  = "shared"
  cpus      = 2
  memory_mb = 4096
